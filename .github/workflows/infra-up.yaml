name: "Infrastructure UP"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::262778473495:role/GitHubActionsEKSRole
          aws-region: ${{ secrets.AWS_REGION }} 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Terraform Init
        run: |
          cd aws-eks-infra
          terraform init

      - name: Terraform Import Existing Resources
        run: |
          cd aws-eks-infra
          
          terraform import aws_iam_policy.aws_load_balancer_controller arn:aws:iam::262778473495:policy/AWSLoadBalancerControllerIAMPolicy || true
          
          terraform import module.eks.aws_cloudwatch_log_group.this[0] /aws/eks/terraform-eks-v2/cluster || true
          
          
          terraform import 'module.eks.module.kms.aws_kms_alias.this["cluster"]' alias/eks/terraform-eks-v2 || true

      - name: Terraform Apply
        run: |
          cd aws-eks-infra
          terraform apply -auto-approve
